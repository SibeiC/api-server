# Server settings
spring.application.name=api-server
server.port=8080
info.app.version=@project.version@
server.forward-headers-strategy=framework
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Swagger API config
app.swagger.server.url=https://api.chencraft.com
app.swagger.server.desc=Production server
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
# Prometheus support
management.endpoints.web.exposure.include=prometheus,health,info,metrics,caches
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=read_only
management.metrics.tags.application=api-server
management.server.port=8957
# Secrets (Mongo URI/database, Cloudflare, mail, TLS keystore, ...) arrive as
# environment variables injected by `doppler run` (project api-server, config dev/prd).
# Email config
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.sender=noreply@chencraft.com
app.alert.recipient=notice@chencraft.com
app.alert.timezone=Asia/Shanghai
app.mail.test-message=false
# GitHub config
github.user.name=SibeiC
# MTls Verification Rules
app.mtls.mongo-check-mandatory=true
# Shared secret nginx injects into every upstream request as X-Proxy-Secret.
# Empty => permissive mode (filter logs WARN and skips the check); set the env var to enforce.
app.mtls.proxy-secret=${APP_MTLS_PROXY_SECRET:}
# Health-check sweep
app.healthcheck.interval-seconds=900
app.healthcheck.failure-threshold-minutes=60
app.healthcheck.retry-attempts=2
app.healthcheck.retry-delay-seconds=2
